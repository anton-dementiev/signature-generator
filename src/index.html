<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <?!= include('styles'); ?>
  </head>
  <body>
    <main class="app-shell">
      <section class="panel panel-form">
        <div class="eyebrow">Google Apps Script</div>
        <h1>Corporate Signature Generator</h1>
        <p class="intro">
          Generate a Gmail-ready HTML signature from a single company template with centrally managed branding.
        </p>

        <form id="signature-form" class="signature-form">
          <? for (var i = 0; i < config.fields.length; i += 1) { ?>
            <? var field = config.fields[i]; ?>
            <label class="field">
              <span><?= field.label ?><? if (field.required) { ?> *<? } ?></span>
              <input
                name="<?= field.key ?>"
                type="<?= field.key === 'email' ? 'email' : 'text' ?>"
                <?= field.required ? 'required' : '' ?>
              >
            </label>
          <? } ?>
          <div class="actions">
            <button type="submit">Generate signature</button>
            <button type="button" class="secondary" id="export-button">Export HTML file</button>
          </div>
        </form>
      </section>

      <section class="panel panel-preview">
        <div class="preview-header">
          <div>
            <div class="eyebrow">Preview</div>
            <h2>Inline HTML output</h2>
          </div>
          <button type="button" class="secondary" id="copy-button">Copy HTML</button>
        </div>

        <div id="signature-preview" class="signature-preview empty-state">
          Generate a signature to preview it here.
        </div>

        <label class="field field-output">
          <span>Generated HTML</span>
          <textarea id="html-output" spellcheck="false" readonly></textarea>
        </label>

        <div id="export-status" class="status"></div>
      </section>
    </main>

    <script>
      window.APP_CONFIG = <?!= JSON.stringify(config) ?>;
    </script>
    <?!= include('client'); ?>
  </body>
</html>
