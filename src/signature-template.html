<table cellpadding="0" cellspacing="0" border="0" style="font-family:Arial,Helvetica,sans-serif;color:#1d1d1b;line-height:1.35;">
  <tr>
    <td style="padding:0 24px 0 0;vertical-align:top;">
      <? if (model.assets.logoUrl) { ?>
        <img
          src="<?= model.assets.logoUrl ?>"
          alt="<?= model.company.companyName ?>"
          style="display:block;max-width:140px;height:auto;border:0;"
        >
      <? } ?>
    </td>
    <td style="vertical-align:top;min-width:280px;">
      <div style="font-size:20px;font-weight:700;color:#0f5a52;"><?= model.person.fullName ?></div>
      <div style="font-size:14px;color:#5a554d;"><?= model.person.jobTitle ?></div>
      <div style="margin-top:12px;font-size:13px;">
        <div><a href="mailto:<?= model.person.email ?>" style="color:#1d1d1b;text-decoration:none;"><?= model.person.email ?></a></div>
        <? if (model.person.phone) { ?><div><?= model.person.phone ?></div><? } ?>
        <? if (model.person.linkedinUrl) { ?><div><a href="<?= model.person.linkedinUrl ?>" style="color:#0f5a52;text-decoration:none;">LinkedIn</a></div><? } ?>
        <? if (model.person.calendarUrl) { ?><div><a href="<?= model.person.calendarUrl ?>" style="color:#0f5a52;text-decoration:none;">Book time</a></div><? } ?>
      </div>
      <div style="margin-top:14px;font-size:13px;">
        <a href="<?= model.company.companyWebsiteUrl ?>" style="color:#1d1d1b;text-decoration:none;"><?= model.company.companyName ?></a>
        <span style="color:#c9b797;"> | </span>
        <a href="<?= model.company.ctaUrl ?>" style="color:#0f5a52;text-decoration:none;font-weight:700;"><?= model.company.ctaText ?></a>
      </div>
    </td>
  </tr>
  <? if (model.assets.bannerUrl) { ?>
    <tr>
      <td colspan="2" style="padding-top:16px;">
        <img
          src="<?= model.assets.bannerUrl ?>"
          alt=""
          style="display:block;max-width:100%;height:auto;border:0;"
        >
      </td>
    </tr>
  <? } ?>
</table>
