<table cellpadding="0" cellspacing="0" border="0" style="font-family:Roboto,'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif;font-size:13px;color:<?= model.company.brandStyle.textSecondary ?>;line-height:1.5;background-color:<?= model.company.brandStyle.surface ?>;">
  <tr>
    <td style="padding:0 16px 0 0;vertical-align:top;">
      <? if (model.assets.logoUrl) { ?>
        <img
          src="<?= model.assets.logoUrl ?>"
          alt="<?= model.company.companyName ?>"
          width="60"
          style="display:block;width:60px;max-width:60px;height:auto;border:0;"
        >
      <? } ?>
    </td>
    <td style="vertical-align:top;min-width:280px;">
      <div style="font-size:15px;font-weight:600;color:<?= model.company.brandStyle.textPrimary ?>;"><?= model.person.fullName ?></div>
      <? if (model.person.jobTitle || model.person.companyName) { ?>
        <div>
          <? if (model.person.jobTitle) { ?>
            <span style="color:<?= model.company.brandStyle.textSecondary ?>;"><?= model.person.jobTitle ?></span>
          <? } ?>
          <? if (model.person.jobTitle && model.person.companyName) { ?>
            <span>, </span>
          <? } ?>
          <? if (model.person.companyName) { ?>
            <a href="<?= model.company.companyWebsiteUrl ?>" target="_blank" rel="noopener noreferrer" style="font-size:14px;font-weight:600;color:<?= model.company.brandStyle.primaryBlue ?>;text-decoration:none;"><?= model.person.companyName ?></a>
          <? } ?>
        </div>
      <? } ?>
      <div style="border-top:1px solid <?= model.company.brandStyle.divider ?>;margin:8px 0;width:100%;"></div>
      <div style="color:<?= model.company.brandStyle.textMuted ?>;font-size:12px;">
        <div><a href="mailto:<?= model.person.email ?>" style="color:<?= model.company.brandStyle.textPrimary ?>;text-decoration:none;"><?= model.person.email ?></a></div>
        <? if (model.person.phone) { ?><div><?= model.person.phone ?></div><? } ?>
        <? if (model.person.linkedinUrl) { ?><div><a href="<?= model.person.linkedinUrl ?>" target="_blank" rel="noopener noreferrer" style="color:<?= model.company.brandStyle.primaryBlue ?>;text-decoration:none;">LinkedIn</a></div><? } ?>
      </div>
      <? if (model.company.tagline || (model.company.calendarLabel && model.company.calendarUrl)) { ?>
        <div style="margin-top:10px;font-size:13px;">
          <? if (model.company.tagline) { ?>
            <span style="color:<?= model.company.brandStyle.ctaMagenta ?>;font-weight:700;"><?= model.company.tagline ?></span>
          <? } ?>
          <? if (model.company.tagline && model.company.calendarLabel && model.company.calendarUrl) { ?>
            <span style="color:<?= model.company.brandStyle.divider ?>;"> | </span>
          <? } ?>
          <? if (model.company.calendarLabel && model.company.calendarUrl) { ?>
            <a href="<?= model.company.calendarUrl ?>" target="_blank" rel="noopener noreferrer" style="color:<?= model.company.brandStyle.primaryBlue ?>;text-decoration:none;font-weight:400;"><?= model.company.calendarLabel ?></a>
          <? } ?>
        </div>
      <? } ?>
    </td>
  </tr>
  <? if (model.assets.bannerUrl) { ?>
    <tr>
      <td colspan="2" style="padding-top:16px;">
        <img
          src="<?= model.assets.bannerUrl ?>"
          alt=""
          style="display:block;max-width:100%;height:auto;border:0;"
        >
      </td>
    </tr>
  <? } ?>
  <? if (model.person.includeConfidentiality && model.company.confidentialityText) { ?>
    <tr>
      <td colspan="2" style="padding-top:10px;font-size:11px;line-height:1.35;color:#888888;">
        <?= model.company.confidentialityText ?>
      </td>
    </tr>
  <? } ?>
  <? if (model.person.includeOptOut && model.company.optOutText) { ?>
    <tr>
      <td colspan="2" style="padding-top:6px;font-size:11px;line-height:1.35;color:#888888;">
        <?= model.company.optOutText ?>
      </td>
    </tr>
  <? } ?>
</table>
