<style>
  :root {
    --bg: #f5f1e8;
    --panel: #fffdf8;
    --panel-border: #d7cfc0;
    --text: #1d1d1b;
    --muted: #6d655b;
    --accent: #0f5a52;
    --accent-strong: #0b463f;
    --warning-bg: #fff5dd;
    --warning-border: #dfc27a;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at top left, rgba(15, 90, 82, 0.1), transparent 24%),
      linear-gradient(180deg, #f8f3e8 0%, #efe9dc 100%);
  }

  .app-shell {
    width: min(1180px, calc(100% - 32px));
    margin: 32px auto;
    display: grid;
    grid-template-columns: minmax(300px, 420px) minmax(0, 1fr);
    gap: 20px;
    align-items: start;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 20px;
    padding: 24px;
    box-shadow: 0 20px 60px rgba(49, 38, 20, 0.08);
  }

  .eyebrow {
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-size: 11px;
    color: var(--muted);
  }

  h1,
  h2 {
    margin: 0;
    font-weight: 600;
  }

  .intro {
    margin: 12px 0 0;
    color: var(--muted);
    line-height: 1.5;
  }

  .signature-form,
  .field-output {
    margin-top: 24px;
  }

  .field {
    display: block;
    margin-bottom: 16px;
  }

  .field span {
    display: block;
    margin-bottom: 8px;
    font-size: 14px;
    font-weight: 600;
  }

  input,
  textarea,
  button {
    font: inherit;
  }

  input,
  textarea {
    width: 100%;
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    background: #fff;
    padding: 12px 14px;
    color: var(--text);
  }

  textarea {
    min-height: 240px;
    resize: vertical;
  }

  .actions,
  .preview-header {
    display: flex;
    gap: 12px;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
  }

  button {
    border: 0;
    border-radius: 999px;
    padding: 12px 18px;
    cursor: pointer;
    background: var(--accent);
    color: #fff;
    transition: background 160ms ease;
  }

  button:hover {
    background: var(--accent-strong);
  }

  button.secondary {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--panel-border);
  }

  .notice,
  .status {
    margin-top: 16px;
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 14px;
  }

  .warning {
    background: var(--warning-bg);
    border: 1px solid var(--warning-border);
  }

  .status:empty {
    display: none;
  }

  .signature-preview {
    margin-top: 20px;
    min-height: 220px;
    border: 1px dashed var(--panel-border);
    border-radius: 16px;
    background: #fff;
    padding: 18px;
    overflow: auto;
  }

  .empty-state {
    display: grid;
    place-items: center;
    color: var(--muted);
  }

  @media (max-width: 860px) {
    .app-shell {
      grid-template-columns: 1fr;
      width: min(100% - 24px, 760px);
      margin: 12px auto 24px;
    }

    .panel {
      padding: 20px;
    }
  }
</style>
